backend:
  name: github
  repo: willylondon/farika-portfolio
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - name: "homepage"
        label: "Home Page"
        file: "content.json"
        fields:
          - name: homepage
            label: Home Page Content
            widget: object
            fields:
              - name: hero
                label: Hero Section
                widget: object
                fields:
                  - { label: "Hero Kicker", name: "kicker", widget: "string" }
                  - { label: "Hero Title", name: "title", widget: "string" }
                  - { label: "Hero Subtext", name: "subtext", widget: "text" }
              - name: about
                label: About Section
                widget: object
                fields:
                  - { label: "About Kicker", name: "kicker", widget: "string" }
                  - { label: "About Title", name: "title", widget: "string" }
                  - { label: "About Text 1", name: "text1", widget: "text" }
                  - { label: "About Text 2", name: "text2", widget: "text" }
              - name: contact
                label: Contact Info
                widget: object
                fields:
                  - { label: "Contact Email", name: "email", widget: "string" }
                  - { label: "Contact Phone", name: "phone", widget: "string" }
      - name: "blog_index"
        label: "Blog Hub (Link New Posts Here)"
        file: "blog.html"
        fields:
          - { label: "Full HTML", name: "body", widget: "code", default_language: "html" }

  - name: "posts"
    label: "New Blog posts"
    label_singular: "Blog Post"
    folder: "blog/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "string", default: "English Education" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Meta Description", name: "description", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }

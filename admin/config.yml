backend:
  name: github
  repo: willylondon/farika-portfolio
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - name: "homepage"
        label: "Home Page"
        file: "content.json"
        fields:
          - name: homepage
            label: Home Page Content
            widget: object
            fields:
              - name: hero
                label: Hero Section
                widget: object
                fields:
                  - { label: "Hero Kicker", name: "kicker", widget: "string" }
                  - { label: "Hero Title", name: "title", widget: "string" }
                  - { label: "Hero Subtext", name: "subtext", widget: "text" }
              - name: about
                label: About Section
                widget: object
                fields:
                  - { label: "About Kicker", name: "kicker", widget: "string" }
                  - { label: "About Title", name: "title", widget: "string" }
                  - { label: "About Text 1", name: "text1", widget: "text" }
                  - { label: "About Text 2", name: "text2", widget: "text" }
              - name: contact
                label: Contact Info
                widget: object
                fields:
                  - { label: "Contact Email", name: "email", widget: "string" }
                  - { label: "Contact Phone", name: "phone", widget: "string" }

  - name: "posts"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "blog/{{slug}}.html"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "SEO Title", name: "seo_title", widget: "string", required: false }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Critical Thinking"
          - "Curriculum Leadership"
          - "Inclusive Instruction"
          - "Teacher Development"
          - "English Education"
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Meta Description", name: "description", widget: "text" }
      - { label: "Card Excerpt", name: "excerpt", widget: "text" }
      - { label: "Article Intro", name: "intro", widget: "text" }
      - { label: "Callout Title", name: "callout_title", widget: "string" }
      - { label: "Callout Text", name: "callout_text", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
